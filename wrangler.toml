# =============================================================================
# ForgeComply 360™ — Cloudflare Worker Configuration
# =============================================================================
# CRITICAL: The database_id below MUST match the active production database.
#   Active DB: forge-comply360-db (73faffec-f001-44bc-880e-62bd932c25b1)
#   Stale DB:  forge-production   (fe250bed-...) ← DO NOT USE
#
# Deploy: wrangler deploy
# Dev:    wrangler dev
# =============================================================================

name = "forge-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Account-level settings
# account_id = ""  # Set via CLOUDFLARE_ACCOUNT_ID env var or wrangler login

# ---------- Production (default) ----------

[vars]
ENVIRONMENT = "production"
APP_NAME = "ForgeComply 360"
OSCAL_VERSION = "1.1.2"
# H-5 FIX: CORS origin must match the actual frontend domain
CORS_ORIGIN = "https://app.forgecomply360.com"
# Fallback pattern for Pages preview deployments
CORS_ORIGIN_PATTERN = "https://*.forgecomply360.pages.dev"
# H-3 FIX: Invite code required for registration (set to empty string to disable)
REGISTRATION_INVITE_CODE = "FORGE-BETA-2026"
# Rate limiting
RATE_LIMIT_RPM = "500"
# Session config
SESSION_TIMEOUT_MINUTES = "15"
MAX_SESSION_HOURS = "8"

[[d1_databases]]
binding = "DB"
database_name = "forge-comply360-db"
database_id = "73faffec-f001-44bc-880e-62bd932c25b1"

[kv_namespaces]
# Uncomment and set IDs after creating via: wrangler kv namespace create <NAME>
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = ""
# [[kv_namespaces]]
# binding = "CACHE"
# id = ""
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = ""

[r2_buckets]
# [[r2_buckets]]
# binding = "EVIDENCE_BUCKET"
# bucket_name = "forge-evidence-production"

# ---------- Staging environment ----------
# Deploy: wrangler deploy --env staging

[env.staging]
name = "forge-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
CORS_ORIGIN = "https://staging.forgecomply360.pages.dev"
CORS_ORIGIN_PATTERN = "https://*.forgecomply360.pages.dev"
REGISTRATION_INVITE_CODE = "FORGE-STAGING-2026"
RATE_LIMIT_RPM = "200"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "forge-comply360-db-demo"
database_id = "094aa4dd-5c79-456e-a2cb-d43f08f677e5"

# ---------- Development environment ----------
# Deploy: wrangler deploy --env dev

[env.dev]
name = "forge-api-dev"

[env.dev.vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:5173"
CORS_ORIGIN_PATTERN = "http://localhost:*"
REGISTRATION_INVITE_CODE = ""
RATE_LIMIT_RPM = "1000"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "forge-comply360-db-demo"
database_id = "094aa4dd-5c79-456e-a2cb-d43f08f677e5"
