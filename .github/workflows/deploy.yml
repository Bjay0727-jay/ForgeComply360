name: Deploy ForgeComply 360

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deployments from racing on migrations and deploys
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run API worker tests
        run: npm test

      - name: Run frontend tests
        run: cd frontend && npm test

      # TAC 202 SR / NIST SR-4: Software Bill of Materials (SBOM) generation
      - name: Generate SBOM (CycloneDX)
        run: |
          npx @cyclonedx/cyclonedx-npm@1.19.3 --output-file sbom-api.json --output-format json
          cd frontend && npx @cyclonedx/cyclonedx-npm@1.19.3 --output-file ../sbom-frontend.json --output-format json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-api.json
            sbom-frontend.json
          retention-days: 90

  # ── Pre-deploy validation ──
  pre-deploy-check:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run pre-deploy checks
        run: bash scripts/pre-deploy-check.sh

  # ── D1 local dry-run: run all migrations against a local SQLite to catch errors ──
  migration-dry-run:
    name: Migration Dry Run (Local D1)
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Apply schema to local D1
        run: npx wrangler d1 execute forge-comply360-db-dev --local --file=database/schema.sql

      - name: Apply all migrations sequentially
        run: |
          FAILED=0
          for f in $(ls database/migrate-*.sql 2>/dev/null | sort); do
            echo "Applying $(basename "$f") to local D1..."
            if ! npx wrangler d1 execute forge-comply360-db-dev --local --file="$f" 2>&1; then
              echo "::error::Migration $(basename "$f") FAILED on local D1 dry-run"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more migrations failed the dry-run. Fix before deploying."
            exit 1
          fi
          echo "All migrations passed local D1 dry-run."

      - name: Apply seed data to local D1
        run: |
          npx wrangler d1 execute forge-comply360-db-dev --local --file=database/seed.sql
          npx wrangler d1 execute forge-comply360-db-dev --local --file=database/seed-controls-expanded.sql
          npx wrangler d1 execute forge-comply360-db-dev --local --file=database/seed-tcf-controls.sql

      - name: Verify table counts
        run: |
          echo "Verifying key tables have data..."
          npx wrangler d1 execute forge-comply360-db-dev --local \
            --command "SELECT 'organizations' AS tbl, COUNT(*) AS cnt FROM organizations
                       UNION ALL SELECT 'users', COUNT(*) FROM users
                       UNION ALL SELECT 'systems', COUNT(*) FROM systems
                       UNION ALL SELECT 'assets', COUNT(*) FROM assets
                       UNION ALL SELECT 'security_controls', COUNT(*) FROM security_controls;"

  # ── Stage 1: Deploy to demo environment for smoke testing ──
  deploy-staging:
    name: Deploy to Staging (Demo)
    runs-on: ubuntu-latest
    needs: [pre-deploy-check, migration-dry-run]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker to demo
        run: npx wrangler deploy --env demo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend (staging)
        run: cd frontend && npm run build
        env:
          VITE_API_URL: https://forge-comply360-api-demo.stanley-riley.workers.dev

      - name: Deploy frontend to staging
        run: npx wrangler pages deploy frontend/dist --project-name=forgecomply360 --branch=demo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke test staging API
        run: |
          echo "Verifying staging API health..."
          sleep 5
          HTTP_STATUS=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" https://forge-comply360-api-demo.stanley-riley.workers.dev/health)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Staging health check failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Staging API healthy (HTTP $HTTP_STATUS)"

  # ── Stage 2: Run migrations BEFORE deploying new Worker code ──
  # Schema additions (CREATE TABLE IF NOT EXISTS, ALTER TABLE ADD COLUMN) are
  # backward-compatible with the currently-running Worker. New Worker code that
  # depends on new columns is NOT backward-compatible with the old schema.
  # Therefore: migrations first, then deploy.
  migrate-db:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap schema_migrations table
        run: |
          echo "Ensuring schema_migrations table exists..."
          npx wrangler d1 execute forge-comply360-db --env production --remote \
            --command "CREATE TABLE IF NOT EXISTS schema_migrations (
              id TEXT PRIMARY KEY DEFAULT (lower(hex(randomblob(16)))),
              version TEXT NOT NULL UNIQUE,
              name TEXT NOT NULL,
              description TEXT,
              applied_at TEXT DEFAULT (datetime('now')),
              applied_by TEXT,
              checksum TEXT,
              execution_time_ms INTEGER,
              success INTEGER DEFAULT 1
            );"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Reconcile untracked migrations
        run: |
          echo "Detecting migrations applied before tracking was added..."
          # Some migrations were applied to the DB (columns exist) but never
          # recorded in schema_migrations. Detect them by checking for
          # characteristic columns and mark as applied to prevent re-runs.
          npx wrangler d1 execute forge-comply360-db --env production --remote \
            --command "
              INSERT OR IGNORE INTO schema_migrations (version, name, description)
              SELECT 'migrate-014-asset-enhancements', 'asset-enhancements', 'Reconciled: columns already present'
              WHERE EXISTS (SELECT 1 FROM pragma_table_info('assets') WHERE name = 'first_seen_at');

              INSERT OR IGNORE INTO schema_migrations (version, name, description)
              SELECT 'migrate-017-servicenow-cmdb', 'servicenow-cmdb', 'Reconciled: columns already present'
              WHERE EXISTS (SELECT 1 FROM pragma_table_info('assets') WHERE name = 'servicenow_sys_id');

              INSERT OR IGNORE INTO schema_migrations (version, name, description)
              SELECT 'migrate-020-fisma-ssp-tables', 'fisma-ssp-tables', 'Reconciled: columns already present'
              WHERE EXISTS (SELECT 1 FROM pragma_table_info('ssp_documents') WHERE name = 'ssp_type');

              INSERT OR IGNORE INTO schema_migrations (version, name, description)
              SELECT 'migrate-023b-add-user-status-column', 'add-user-status-column', 'Reconciled: column already present'
              WHERE EXISTS (SELECT 1 FROM pragma_table_info('users') WHERE name = 'status');
            " || echo "Reconciliation step completed (some checks may have been skipped)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run Migrations
        run: |
          FAILED=0
          for f in $(ls database/migrate-*.sql 2>/dev/null | sort); do
            MIGRATION_NAME=$(basename "$f" .sql)
            # Extract the version prefix: migrate-001-foo -> 001, migrate-023b-foo -> 023b
            MIGRATION_NUM=$(echo "$MIGRATION_NAME" | sed 's/^migrate-\([0-9a-z]*\)-.*/\1/')
            echo "::group::Migration: $MIGRATION_NAME"

            # Check if migration was already applied.
            # Migration 013 seeded historical versions as short numbers ('001'),
            # while the runner records full filenames ('migrate-001-poam-enhancements').
            # Check for BOTH formats to handle either convention.
            ALREADY_APPLIED=$(npx wrangler d1 execute forge-comply360-db --env production --remote \
              --command "SELECT version FROM schema_migrations WHERE version = '${MIGRATION_NAME}' OR version = '${MIGRATION_NUM}'" --json 2>/dev/null \
              | grep -cE "(${MIGRATION_NAME}|\"${MIGRATION_NUM}\")" || true)

            if [ "$ALREADY_APPLIED" -gt 0 ]; then
              echo "Skipping $MIGRATION_NAME (already applied)"
              echo "::endgroup::"
              continue
            fi

            echo "Applying migration: $f"
            if npx wrangler d1 execute forge-comply360-db --env production --remote --file="$f"; then
              # Record successful migration using full filename as the version
              npx wrangler d1 execute forge-comply360-db --env production --remote \
                --command "INSERT OR IGNORE INTO schema_migrations (version, name) VALUES ('${MIGRATION_NAME}', '${MIGRATION_NAME}')" || true
              echo "Migration $MIGRATION_NAME applied successfully"
            else
              echo "::error::Migration $MIGRATION_NAME FAILED"
              FAILED=1
            fi
            echo "::endgroup::"
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more migrations failed. Aborting deployment."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Note: Full schema.sql is only needed for fresh databases.
      # For existing production databases, use incremental migrate-*.sql files.
      - name: Verify DB Connection
        run: npx wrangler d1 execute forge-comply360-db --env production --remote --command "SELECT COUNT(*) FROM organizations"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Seed steps use INSERT OR IGNORE so they are idempotent and safe to re-run.
      - name: Seed DB
        run: npx wrangler d1 execute forge-comply360-db --env production --remote --file=database/seed.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Seed Expanded Controls
        run: npx wrangler d1 execute forge-comply360-db --env production --remote --file=database/seed-controls-expanded.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Seed TCF Controls
        run: npx wrangler d1 execute forge-comply360-db --env production --remote --file=database/seed-tcf-controls.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Stage 3: Deploy production Worker + Frontend (sequential) ──
  deploy-api:
    name: Deploy Workers API
    runs-on: ubuntu-latest
    needs: migrate-db
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify production API health
        run: |
          echo "Waiting for Worker to propagate..."
          sleep 10
          HTTP_STATUS=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" https://forge-comply360-api.stanley-riley.workers.dev/health)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Production API health check failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "Production API healthy (HTTP $HTTP_STATUS)"

  deploy-frontend:
    name: Deploy Frontend (Pages)
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_URL: https://forge-comply360-api.stanley-riley.workers.dev

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy frontend/dist --project-name=forgecomply360 --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
